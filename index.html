const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ── LIGHTWEIGHT SVG CHARTS (no external dep) ─────────────────
function ResponsiveContainer({ width, height, children }) {
  const ref = useRef(null);
  const [w, setW] = useState(300);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => { if (entries[0]) setW(entries[0].contentRect.width); });
    ro.observe(ref.current);
    setW(ref.current.offsetWidth || 300);
    return () => ro.disconnect();
  }, []);
  const h = typeof height === "number" ? height : 200;
  return <div ref={ref} style={{ width: width || "100%", height: h }}>
    {React.cloneElement(React.Children.only(children), { _w: w, _h: h })}
  </div>;
}

function PieChart({ children, _w = 200, _h = 200 }) {
  return <svg width={_w} height={_h}>{React.Children.map(children, c => c && React.cloneElement(c, { _w, _h }))}</svg>;
}

function Pie({ data = [], dataKey, cx = "50%", cy = "50%", innerRadius = 0, outerRadius = 60, paddingAngle = 0, children, _w = 200, _h = 200, stroke }) {
  const [hov, setHov] = useState(null);
  const total = data.reduce((s, d) => s + (d[dataKey] || 0), 0);
  const cxN = cx === "50%" ? _w / 2 : parseFloat(cx);
  const cyN = cy === "50%" ? _h / 2 : parseFloat(cy);
  const cells = React.Children.toArray(children);
  let angle = -Math.PI / 2;
  const paths = data.map((d, i) => {
    const val = d[dataKey] || 0;
    const frac = total > 0 ? val / total : 0;
    const span = frac * 2 * Math.PI - (paddingAngle * Math.PI / 180);
    const a1 = angle, a2 = angle + span;
    angle += frac * 2 * Math.PI;
    const or = hov === i ? outerRadius + 4 : outerRadius;
    const x1 = cxN + or * Math.cos(a1), y1 = cyN + or * Math.sin(a1);
    const x2 = cxN + or * Math.cos(a2), y2 = cyN + or * Math.sin(a2);
    const xi1 = cxN + innerRadius * Math.cos(a1), yi1 = cyN + innerRadius * Math.sin(a1);
    const xi2 = cxN + innerRadius * Math.cos(a2), yi2 = cyN + innerRadius * Math.sin(a2);
    const large = span > Math.PI ? 1 : 0;
    const fill = cells[i] ? cells[i].props.fill : PAL[i % PAL.length];
    const path = innerRadius > 0
      ? `M${xi1},${yi1} L${x1},${y1} A${or},${or} 0 ${large} 1 ${x2},${y2} L${xi2},${yi2} A${innerRadius},${innerRadius} 0 ${large} 0 ${xi1},${yi1} Z`
      : `M${cxN},${cyN} L${x1},${y1} A${or},${or} 0 ${large} 1 ${x2},${y2} Z`;
    return <path key={i} d={path} fill={fill} stroke="none" style={{ transition: "d 0.2s", cursor: "pointer" }} onMouseEnter={() => setHov(i)} onMouseLeave={() => setHov(null)} />;
  });
  return <g>{paths}</g>;
}

function Cell({ fill }) { return null; }

function Tooltip() { return null; }

// Bar Chart
function BarChart({ data = [], children, margin = {}, _w = 400, _h = 200 }) {
  const [hov, setHov] = useState(null);
  const ml = margin.left || 50, mr = margin.right || 10, mt = margin.top || 8, mb = margin.bottom || 24;
  const iw = _w - ml - mr, ih = _h - mt - mb;
  const bars = React.Children.toArray(children).filter(c => c.type === Bar);
  const xAxis = React.Children.toArray(children).find(c => c.type === XAxis);
  const yAxis = React.Children.toArray(children).find(c => c.type === YAxis);
  const allVals = data.map(d => bars.map(b => d[b.props.dataKey] || 0)).flat();
  const minV = Math.min(0, ...allVals), maxV = Math.max(0, ...allVals);
  const range = maxV - minV || 1;
  const toY = v => mt + ih - ((v - minV) / range) * ih;
  const zero = toY(0);
  const bw = iw / data.length;
  const ticks = 4;
  const yTicks = Array.from({ length: ticks + 1 }, (_, i) => minV + (range * i / ticks));
  return (
    <svg width={_w} height={_h}>
      {/* grid */}
      {yTicks.map((v, i) => <line key={i} x1={ml} x2={_w - mr} y1={toY(v)} y2={toY(v)} stroke="#1e2a3a" strokeDasharray="3 3" />)}
      {/* zero line */}
      <line x1={ml} x2={_w - mr} y1={zero} y2={zero} stroke="#334155" strokeWidth={1} />
      {/* bars */}
      {bars.map(bar => data.map((d, i) => {
        const v = d[bar.props.dataKey] || 0;
        const cells = React.Children.toArray(bar.props.children);
        const fill = cells[i] ? cells[i].props.fill : "#3b82f6";
        const bh = Math.abs(toY(v) - zero);
        const x = ml + i * bw + bw * 0.15;
        const y = v >= 0 ? zero - bh : zero;
        return <rect key={i} x={x} y={y} width={bw * 0.7} height={Math.max(bh, 1)} fill={fill} rx={3} opacity={hov === i ? 1 : 0.85} onMouseEnter={() => setHov(i)} onMouseLeave={() => setHov(null)} />;
      }))}
      {/* x labels */}
      {xAxis && data.map((d, i) => <text key={i} x={ml + i * bw + bw / 2} y={_h - 4} textAnchor="middle" fill="#64748b" fontSize={11}>{d[xAxis.props.dataKey]}</text>)}
      {/* y labels */}
      {yAxis && yTicks.map((v, i) => <text key={i} x={ml - 4} y={toY(v) + 4} textAnchor="end" fill="#475569" fontSize={10}>{yAxis.props.tickFormatter ? yAxis.props.tickFormatter(v) : Math.round(v)}</text>)}
      {/* hover tooltip */}
      {hov !== null && bars.length > 0 && (() => {
        const d = data[hov]; const v = d[bars[0].props.dataKey] || 0;
        const x = ml + hov * bw + bw / 2; const y = toY(v) - 8;
        const label = yAxis && yAxis.props.tickFormatter ? yAxis.props.tickFormatter(v) : ("€" + parseFloat(v).toLocaleString("it-IT", { minimumFractionDigits: 2 }));
        return <text x={x} y={Math.max(y, mt + 12)} textAnchor="middle" fill="#e2e8f0" fontSize={11} fontWeight={600}>{label}</text>;
      })()}
    </svg>
  );
}
function Bar({ dataKey, children, radius }) { return null; }
function XAxis({ dataKey, tickFormatter }) { return null; }
function YAxis({ tickFormatter }) { return null; }
function CartesianGrid() { return null; }

// Area Chart
function AreaChart({ data = [], children, margin = {}, _w = 400, _h = 200 }) {
  const [hov, setHov] = useState(null);
  const ml = margin.left || 50, mr = margin.right || 10, mt = margin.top || 8, mb = margin.bottom || 24;
  const iw = _w - ml - mr, ih = _h - mt - mb;
  const areas = React.Children.toArray(children).filter(c => c.type === Area);
  const refLines = React.Children.toArray(children).filter(c => c.type === ReferenceLine);
  const xAxis = React.Children.toArray(children).find(c => c.type === XAxis);
  const yAxis = React.Children.toArray(children).find(c => c.type === YAxis);
  const allVals = data.map(d => areas.map(a => d[a.props.dataKey] || 0)).flat().filter(v => !isNaN(v));
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const range = maxV - minV || 1;
  const toX = i => ml + (i / Math.max(data.length - 1, 1)) * iw;
  const toY = v => mt + ih - ((v - minV) / range) * ih;
  const ticks = 4;
  const yTicks = Array.from({ length: ticks + 1 }, (_, i) => minV + (range * i / ticks));
  const xInterval = Math.max(1, Math.floor(data.length / 6));
  return (
    <svg width={_w} height={_h}>
      <defs>
        {areas.map((a, i) => <linearGradient key={i} id={"ag" + i} x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%" stopColor={a.props.stroke} stopOpacity={0.18} />
          <stop offset="95%" stopColor={a.props.stroke} stopOpacity={0} />
        </linearGradient>)}
      </defs>
      {yTicks.map((v, i) => <line key={i} x1={ml} x2={_w - mr} y1={toY(v)} y2={toY(v)} stroke="#1e2a3a" strokeDasharray="3 3" />)}
      {refLines.map((rl, i) => { const y = toY(rl.props.y || 0); return <line key={i} x1={ml} x2={_w - mr} y1={y} y2={y} stroke={rl.props.stroke || "#334155"} strokeDasharray={rl.props.strokeDasharray || "3 3"} />; })}
      {areas.map((a, ai) => {
        if (data.length < 2) return null;
        const pts = data.map((d, i) => [toX(i), toY(d[a.props.dataKey] || 0)]);
        const linePath = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
        const areaPath = linePath + ` L${toX(data.length - 1)},${mt + ih} L${toX(0)},${mt + ih} Z`;
        return <g key={ai}>
          <path d={areaPath} fill={"url(#ag" + ai + ")"} />
          <path d={linePath} fill="none" stroke={a.props.stroke} strokeWidth={a.props.strokeWidth || 2} strokeDasharray={a.props.strokeDasharray} />
          {a.props.dot && data.length <= 20 && pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={3} fill={a.props.stroke} />)}
        </g>;
      })}
      {xAxis && data.map((d, i) => {
        if (i % xInterval !== 0 && i !== data.length - 1) return null;
        return <text key={i} x={toX(i)} y={_h - 4} textAnchor="middle" fill="#64748b" fontSize={11}>{d[xAxis.props.dataKey]}</text>;
      })}
      {yAxis && yTicks.map((v, i) => <text key={i} x={ml - 4} y={toY(v) + 4} textAnchor="end" fill="#475569" fontSize={10}>{yAxis.props.tickFormatter ? yAxis.props.tickFormatter(v) : Math.round(v)}</text>)}
      {/* hover crosshair */}
      {hov !== null && (() => {
        const x = toX(hov);
        return <>
          <line x1={x} x2={x} y1={mt} y2={mt + ih} stroke="#334155" strokeWidth={1} strokeDasharray="3 3" />
          {areas.map((a, ai) => { const v = data[hov][a.props.dataKey] || 0; return <circle key={ai} cx={x} cy={toY(v)} r={4} fill={a.props.stroke} />; })}
          <rect x={Math.min(x + 6, _w - ml - 100)} y={mt + 4} width={92} height={areas.length * 18 + 10} rx={4} fill="#1e293b" stroke="#2a3a50" strokeWidth={1} />
          {areas.map((a, ai) => { const v = data[hov][a.props.dataKey]; const fmt = yAxis && yAxis.props.tickFormatter ? yAxis.props.tickFormatter(v) : "EUR " + parseFloat(v).toLocaleString("it-IT", { minimumFractionDigits: 0 }); return <text key={ai} x={Math.min(x + 12, _w - ml - 94)} y={mt + 16 + ai * 18} fill="#e2e8f0" fontSize={10}>{a.props.name}: {fmt}</text>; })}
        </>;
      })()}
      <rect x={ml} y={mt} width={iw} height={ih} fill="transparent" onMouseMove={e => { const svgRect = e.currentTarget.ownerSVGElement.getBoundingClientRect(); const px = e.clientX - svgRect.left - ml; const idx = Math.round((px / iw) * (data.length - 1)); setHov(Math.max(0, Math.min(data.length - 1, idx))); }} onMouseLeave={() => setHov(null)} style={{ cursor: "crosshair" }} />
    </svg>
  );
}
function Area({ dataKey, stroke, strokeWidth, strokeDasharray, fill, dot, name, activeDot }) { return null; }
function ReferenceLine({ y, stroke, strokeDasharray }) { return null; }

// ── COMPOSITION CALCULATOR ──────────────────────────────────
function computeComposition(holdings) {
  const equityTickers = ["VUAA","XLYP6","EIMI","X.IUSN","XMJP"];
  const equityHoldings = holdings.filter(h => equityTickers.includes(h.ticker));
  const equityTotal = equityHoldings.reduce((s, h) => s + h.value, 0);
  if (equityTotal === 0) return null;
  const sectorMap = {}, countryMap = {}, holdingMap = {};
  equityHoldings.forEach(h => {
    const etfData = ETF_COMPOSITION[h.ticker];
    if (!etfData) return;
    const w = h.value / equityTotal;
    (etfData.sectors || []).forEach(s => { sectorMap[s.name] = (sectorMap[s.name] || 0) + s.pct * w; });
    (etfData.countries || []).forEach(c => { countryMap[c.name] = (countryMap[c.name] || 0) + c.pct * w; });
    (etfData.top_holdings || []).forEach(hh => {
      if (hh.name.startsWith("Altro")) return;
      if (!holdingMap[hh.name]) holdingMap[hh.name] = { name: hh.name, pct: 0, sector: hh.sector, etf: h.ticker };
      holdingMap[hh.name].pct += (hh.pct / 100) * (h.w / 100) * 100;
    });
  });
  const portfolio_sectors = Object.entries(sectorMap).map(([name, pct]) => ({ name, pct: parseFloat(pct.toFixed(2)) })).sort((a, b) => b.pct - a.pct);
  const portfolio_countries = Object.entries(countryMap).map(([name, pct]) => ({ name, pct: parseFloat(pct.toFixed(2)) })).sort((a, b) => b.pct - a.pct).slice(0, 12);
  const portfolio_top_holdings = Object.values(holdingMap).sort((a, b) => b.pct - a.pct).slice(0, 15);
  const etf_details = {};
  equityHoldings.forEach(h => { if (ETF_COMPOSITION[h.ticker]) etf_details[h.ticker] = ETF_COMPOSITION[h.ticker]; });
  return { etf_details, portfolio_sectors, portfolio_countries, portfolio_top_holdings };
}

// ── API CALL ────────────────────────────────────────────────
async function callAPI(apiKey, systemPrompt, userPrompt, opts) {
  if (!apiKey) throw new Error("API key Anthropic mancante. Inseriscila nelle impostazioni.");
  const o = opts || {};
  const timeout = o.timeoutMs || 120000;
  let userContent = o.imageBase64
    ? [{ type:"image", source:{ type:"base64", media_type: o.imageMime||"image/jpeg", data: o.imageBase64 }}, { type:"text", text: userPrompt }]
    : userPrompt;
  const baseBody = { model: MODEL, max_tokens: 4096, system: systemPrompt };
  if (o.search) baseBody.tools = [{ type:"web_search_20250305", name:"web_search" }];
  let messages = [{ role:"user", content: userContent }];
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    let iterations = 0;
    while (iterations < 8) {
      iterations++;
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ ...baseBody, messages }),
        signal: controller.signal,
      });
      if (!r.ok) { const t = await r.text().catch(()=>"?"); throw new Error("HTTP " + r.status + ": " + t.slice(0,200)); }
      const data = await r.json();
      if (data.error) throw new Error(data.error.message || "API error");
      const blocks = data.content || [];
      if (data.stop_reason === "end_turn" || !blocks.some(b => b.type === "tool_use")) {
        const text = blocks.filter(b => b.type === "text" && b.text).map(b => b.text).join("\n");
        if (!text.trim()) throw new Error("Risposta vuota dal modello.");
        clearTimeout(timer);
        return text;
      }
      messages.push({ role:"assistant", content: blocks });
      const toolResults = blocks.filter(b => b.type === "tool_use").map(b => ({ type:"tool_result", tool_use_id: b.id, content:"" }));
      messages.push({ role:"user", content: toolResults });
    }
    clearTimeout(timer);
    throw new Error("Troppe iterazioni nel tool loop");
  } catch(err) {
    clearTimeout(timer);
    if (err.name === "AbortError") throw new Error("Timeout dopo " + (timeout/1000) + "s");
    throw err;
  }
}

// ── JSON PARSER ─────────────────────────────────────────────
function extractJSON(text) {
  let s = text.replace(/```[a-zA-Z]*\s*/g,"").replace(/```/g,"").trim();
  try { return JSON.parse(s); } catch(e) {}
  let depth = 0, start = -1;
  for (let i = 0; i < s.length; i++) {
    if (s[i] === "{") { if (depth===0) start=i; depth++; }
    else if (s[i] === "}") { depth--; if (depth===0 && start>=0) { try { return JSON.parse(s.slice(start,i+1)); } catch(e2){ start=-1; } } }
  }
  throw new Error("No JSON found. Text: " + text.slice(0,80));
}

// ── PORTFOLIO MATH ───────────────────────────────────────────
function buildHoldings(lots, prices) {
  const map = {};
  lots.forEach(lot => {
    if (!map[lot.ticker]) map[lot.ticker] = { ticker: lot.ticker, lots:[], qty:0, cost:0 };
    map[lot.ticker].lots.push(lot);
    map[lot.ticker].qty += lot.qty;
    map[lot.ticker].cost += lot.qty * lot.buyPrice;
  });
  const list = Object.values(map).map(g => {
    const avg = g.cost / g.qty;
    const p = prices[g.ticker];
    const cur = p ? p.price : avg;
    const val = g.qty * cur;
    const pnl = val - g.cost;
    const pnlP = g.cost > 0 ? ((pnl/g.cost)*100) : 0;
    const dc = p ? (p.dayChange||0) : 0;
    return { ticker:g.ticker, name:(p&&p.name)||HINTS[g.ticker]||g.ticker, cat:(p&&p.category)||CATEGORIES[g.ticker]||"", lots:g.lots, qty:g.qty, avg, cost:g.cost, price:cur, value:val, pnl, pnlP, dayChange:dc, dayPnl:val*(dc/100), w:0 };
  });
  const tv = list.reduce((s,h)=>s+h.value,0);
  list.forEach(h => { h.w = tv>0 ? (h.value/tv)*100 : 0; });
  const tc = list.reduce((s,h)=>s+h.cost,0);
  return { list, tv, tc };
}

                    <div style={{fontSize:10,fontWeight:600,letterSpacing:1.2,color:"#5B9BD5",textTransform:"uppercase",marginBottom:12}}>Implicazioni Portfolio</div>
                    {macro.portfolio_implications.map((imp,i)=>(
                      <div key={i} style={{display:"flex",gap:10,marginBottom:10,fontSize:13,color:"#64748b",lineHeight:1.5}}>
                        <span style={{color:"#5B9BD5",fontWeight:700}}>-&gt;</span><span>{imp}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

      </div>

      <div style={{padding:mob?"20px 14px 0":"20px 24px 0",borderTop:"1px solid #1e2a3a",marginTop:16,textAlign:"center"}}>
        <p style={{fontSize:9,color:"#475569",lineHeight:1.6,maxWidth:540,margin:"0 auto"}}>Solo a scopo informativo. Non costituisce consulenza finanziaria.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
